spring.application.name=BankingSystem

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/banking_system_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# Logging Configuration (30-06-2026)
logging.level.root=INFO
logging.level.com.bankingsystem=DEBUG
logging.level.org.springframework.security=DEBUG